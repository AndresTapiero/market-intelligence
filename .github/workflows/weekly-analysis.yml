name: Análisis semanal

# Equivale a lo que hace run-weekly.sh localmente (node analyze.js),
# pero la API key se toma de un secret del repo, no del código.
on:
  schedule:
    # Día 26 de cada mes, 12:00 UTC = 07:00 en Colombia (UTC-5).
    - cron: '0 12 26 * *'
  workflow_dispatch: {}

# analyze.js hace git push del reporte al final; necesita escritura en el repo.
permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Validación previa: si test-dry-run.js falla (exit != 0), el job se
      # detiene aquí y el análisis nunca corre.
      - name: Validación previa (dry run)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node test-dry-run.js

      - name: Run weekly analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node analyze.js
